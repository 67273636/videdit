name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download FFmpeg
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          unzip -q ffmpeg.zip
          mv ffmpeg-*-win64-gpl ffmpeg_bin

      - name: Install dependencies
        run: pip install --upgrade pip pyinstaller PyQt6 rich

      - name: Bundle FFmpeg
        run: |
          mkdir src\\ffmpeg_bin
          copy ffmpeg_bin\\bin\\ffmpeg.exe src\\ffmpeg_bin\\
          copy ffmpeg_bin\\bin\\ffprobe.exe src\\ffmpeg_bin\\
          copy ffmpeg_bin\\bin\\ffplay.exe src\\ffmpeg_bin\\

      - name: Build EXE
        run: |
          python -m PyInstaller --name videdit --onefile --noconsole --add-data "src;src" --hidden-import PyQt6 --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import PyQt6.QtWidgets --hidden-import rich src\\main.py

      - uses: actions/upload-artifact@v4
        with:
          name: videdit-exe
          path: dist\\videdit.exe
          retention-days: 90
