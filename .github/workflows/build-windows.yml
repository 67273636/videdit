name: Build Windows EXE

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download FFmpeg
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          unzip -q ffmpeg.zip
          mv ffmpeg-*-win64-gpl ffmpeg_bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 rich

      - name: Bundle FFmpeg
        run: |
          mkdir -p src/ffmpeg_bin
          cp -r ffmpeg_bin/bin src/ffmpeg_bin/

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller --name videdit --onefile --noconsole --add-data "src/ffmpeg_bin;ffmpeg_bin" --collect-all PyQt6 src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videdit-windows-exe
          path: dist/videdit.exe
          retention-days: 90
